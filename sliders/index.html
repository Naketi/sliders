<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Il est pas beau ce slider ?</title>
	<link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
	<div class="slidershow middle">
		<div class="slides">
			<!--Les petits trucs et quant tu clique ça met un point dedant-->
			<input type="radio" name="r" id="r1" checked>
			<input type="radio" name="r" id="r2">
			<input type="radio" name="r" id="r3">
			<input type="radio" name="r" id="r4">
			<div class="slide s1">
				<img src="img/1.jpg">
			</div>
			<div class="slide">
				<img src="img/2.jpg">
			</div>
			<div class="slide">
				<img src="img/3.jpg">
			</div>
			<div class="slide">
				<img src="img/4.jpg">
			</div>
		</div>

		<div class="nav">
		<!-- Label pour l'interaction avec l'utilisateur(les barres blanches en bas) -->
			<label for="r1" class="bar"></label>
			<label for="r2" class="bar"></label>
			<label for="r3" class="bar"></label>
			<label for="r4" class="bar"></label>
		</div>
	</div>
	<p> Si tu veux en rajouter tu fais r5, img/5.jpg,etc... <br> Genre tu rajouter 1 partout <br> Après il te reste juste à l'adapter à ton site (bonne chance)</p>
</body>
</html>
